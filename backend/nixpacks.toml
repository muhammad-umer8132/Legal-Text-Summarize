[phases.setup]
aptPkgs = [
  "python3",
  "python3-pip",
  "python3-venv",
  "chromium-browser"
]

[phases.install]
cmds = [
  "pip3 install -r requirements.txt --break-system-packages",
  "pip3 install playwright --break-system-packages",
  "python3 -m playwright install chromium --with-deps"
]

[start]
cmd = "python3 -m uvicorn main:app --host 0.0.0.0 --port $PORT"